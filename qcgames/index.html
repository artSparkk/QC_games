<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quantum Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== PARTICLE BACKGROUND ===== -->
    <canvas id="bg-particles"></canvas>

    <!-- ===== HOME SCREEN ===== -->
    <div id="home-screen" class="screen active">
        <div class="home-content">
            <div class="logo-section">
                <div class="logo-icon" aria-hidden="true">
    <img src="logo.jpg" alt="Quantum Code Club Logo" class="logo-img">
</div>
                <h1 class="site-title">Quantum Games</h1>
                <p class="site-subtitle">by Quantum Code Club</p>
            </div>
            <div class="games-grid" id="games-grid"></div>
        </div>
        <footer class="footer">quantum games by issam - IT Dep</footer>
    </div>

    <!-- ===== GAME SCREEN ===== -->
    <div id="game-screen" class="screen">
        <header class="game-header">
            <button class="header-btn" id="btn-home" aria-label="Home">&#9666; Home</button>
            <h2 class="game-title" id="game-title"></h2>
            <div class="score-display">
                <span class="score-label">SCORE</span>
                <span class="score-value" id="current-score">0</span>
            </div>
        </header>
        <main class="game-main">
            <div class="canvas-wrapper">
                <canvas id="game-canvas"></canvas>
                <!-- Start Overlay -->
                <div class="overlay active" id="overlay-start">
                    <div class="overlay-content">
                        <h3 id="start-game-name"></h3>
                        <p id="start-instructions"></p>
                        <button class="game-btn" id="btn-start">&#9654; Start</button>
                    </div>
                </div>
                <!-- Game Over Overlay -->
                <div class="overlay" id="overlay-gameover">
                    <div class="overlay-content">
                        <h3>Game Over</h3>
                        <p class="final-score">Score: <span id="final-score">0</span></p>
                        <p class="high-score" id="high-score-msg"></p>
                        <div class="overlay-buttons">
                            <button class="game-btn" id="btn-retry">&#128260; Retry</button>
                            <button class="game-btn secondary" id="btn-gohome">&#127968; Home</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer class="footer">quantum games by issam - IT Dep</footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
